<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japa Counter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="top-panel">
    <h2>Japa Counter 📿</h2>

    <div class="controls">
      <label>Target Mala:</label>
      <input type="number" id="targetInput" placeholder="e.g. 5" />
    </div>

    <div class="stats">
      <p>Count: <span id="count">0</span></p>
      <p>Round: <span id="round">0</span></p>
    </div>

    <button id="resetBtn">Reset</button>
  </div>

  <!-- FULL SCREEN BUTTON -->
  <div id="tapArea">TAP</div>

  <audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

  <script src="script.js"></script>
</body>
</html>
